name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.41.5'
  # Bump after verifying ABI compat (esp. page-alignment on devices < API 35).
  EXPECTED_NDK_MAJOR: '28'
  # Android dynamic linker on devices < API 35 mishandles 16KB-aligned LOAD
  # segments. scripts/build_dufs.sh android-arm64 forces 0x1000 via
  # -Wl,-z,max-page-size=0x1000; this guard catches drift.
  ANDROID_LIBDUFS_ALIGN: '0x1000'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get
      - run: flutter analyze

  build-android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        shell: bash
        run: echo "VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | awk -F'+' '{print $1}')" >> $GITHUB_ENV
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-aarch64-linux-android-${{ hashFiles('scripts/build_dufs.sh') }}
          restore-keys: |
            cargo-aarch64-linux-android-
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - name: Resolve and check NDK version
        run: |
          NDK_DIR=$(find "$ANDROID_HOME/ndk" -maxdepth 1 -type d -name '[0-9]*' | sort -V | tail -1)
          NDK_VERSION=$(basename "$NDK_DIR")
          echo "NDK found: $NDK_VERSION at $NDK_DIR"
          NDK_MAJOR=${NDK_VERSION%%.*}
          if [ "$NDK_MAJOR" != "${{ env.EXPECTED_NDK_MAJOR }}" ]; then
            echo "::warning::NDK major $NDK_MAJOR (got $NDK_VERSION) differs from expected ${{ env.EXPECTED_NDK_MAJOR }}. Bump EXPECTED_NDK_MAJOR after confirming ABI compat (especially page alignment on devices < API 35)."
          fi
          echo "ANDROID_NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
      - name: Compile dufs from source
        run: bash scripts/build_dufs.sh android-arm64
      - name: Verify libdufs.so page alignment
        run: |
          SO=android/app/src/main/jniLibs/arm64-v8a/libdufs.so
          [ -f "$SO" ] || { echo "::error::missing $SO"; exit 1; }
          BAD=$(readelf -lW "$SO" | awk '/^  LOAD/ {print $NF}' | sort -u | grep -vF "${{ env.ANDROID_LIBDUFS_ALIGN }}" || true)
          if [ -n "$BAD" ]; then
            echo "::error::libdufs.so LOAD alignment != ${{ env.ANDROID_LIBDUFS_ALIGN }}: got $BAD"
            echo "::error::Older Android (< API 35) dynamic linker mishandles 16KB-aligned binaries -> dufs binds but networking syscalls misbehave."
            echo "::error::Check scripts/build_dufs.sh android-arm64 has -Wl,-z,max-page-size=${{ env.ANDROID_LIBDUFS_ALIGN }}."
            exit 1
          fi
          echo "OK: libdufs.so all LOAD segments aligned to ${{ env.ANDROID_LIBDUFS_ALIGN }}"
      - name: Decode Keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/inout-release.jks
          echo "KEYSTORE_FILE=/tmp/inout-release.jks" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
      - name: Build APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release
      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk inout-${{ env.VERSION }}-android-arm64.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            inout-${{ env.VERSION }}-android-arm64.apk

  build-windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        shell: bash
        run: echo "VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | awk -F'+' '{print $1}')" >> $GITHUB_ENV
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-x86_64-pc-windows-msvc-${{ hashFiles('scripts/build_dufs.sh') }}
          restore-keys: |
            cargo-x86_64-pc-windows-msvc-
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Compile dufs from source
        run: bash scripts/build_dufs.sh windows-x86_64
        shell: bash
      - run: flutter build windows --release
      - name: Copy dufs DLL to build output
        shell: bash
        run: cp "${{ github.workspace }}/assets/dufs/dufs-windows-x86_64.dll" build/windows/x64/runner/Release/dufs.dll
      - name: Create zip
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath inout-${{ env.VERSION }}-windows-x64.zip
      - name: Install NSIS
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Build NSIS installer
        run: makensis /DAPP_VERSION=${{ env.VERSION }} installer\inout.nsi
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            inout-${{ env.VERSION }}-windows-x64.zip
            inout-${{ env.VERSION }}-windows-x64-setup.exe

  build-linux-x64:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-x86_64-unknown-linux-gnu-${{ hashFiles('scripts/build_dufs.sh') }}
          restore-keys: |
            cargo-x86_64-unknown-linux-gnu-
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev dpkg-dev libfuse2 cmake ninja-build clang lld llvm libayatana-appindicator3-dev libsecret-1-dev
      - name: Build and package
        run: bash scripts/build_linux.sh x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: build/linux/output/*

  build-linux-arm64:
    name: Linux ARM64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install Flutter manually
        run: |
          git clone --depth 1 --branch ${{ env.FLUTTER_VERSION }} https://github.com/flutter/flutter.git "$HOME/flutter" || \
            git clone --depth 1 --branch stable https://github.com/flutter/flutter.git "$HOME/flutter"
          export PATH="$HOME/flutter/bin:$HOME/flutter/bin/cache/dart-sdk/bin:$PATH"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
          echo "$HOME/flutter/bin/cache/dart-sdk/bin" >> "$GITHUB_PATH"
          flutter precache --linux
          flutter config --no-analytics
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-aarch64-unknown-linux-gnu-${{ hashFiles('scripts/build_dufs.sh') }}
          restore-keys: |
            cargo-aarch64-unknown-linux-gnu-
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev dpkg-dev libfuse2 cmake ninja-build clang lld llvm libayatana-appindicator3-dev libsecret-1-dev
      - name: Build and package
        run: |
          export PATH="$HOME/flutter/bin:$HOME/flutter/bin/cache/dart-sdk/bin:$PATH"
          bash scripts/build_linux.sh aarch64
      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: build/linux/output/*

  build-macos-arm64:
    name: macOS ARM64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-aarch64-apple-darwin-${{ hashFiles('scripts/build_dufs.sh') }}
          restore-keys: |
            cargo-aarch64-apple-darwin-
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Build and package
        run: bash scripts/build_macos.sh aarch64
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: build/macos/output/*

  build-ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-aarch64-apple-ios-${{ hashFiles('scripts/build_dufs.sh') }}
          restore-keys: |
            cargo-aarch64-apple-ios-
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios
      - name: Compile dufs from source
        run: bash scripts/build_dufs.sh ios-arm64
      - name: Build iOS (no codesign)
        run: |
          flutter build ios --release --no-codesign
          mkdir -p build/ios/output
          APP_NAME="inout"
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | awk -F'+' '{print $1}')
          cp -r build/ios/iphoneos/Runner.app "build/ios/output/${APP_NAME}-${VERSION}-ios-arm64.app"
          cd build/ios/output && zip -r -y "${APP_NAME}-${VERSION}-ios-arm64.zip" "${APP_NAME}-${VERSION}-ios-arm64.app"
      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: build/ios/output/*

  release:
    name: Release
    needs: [build-android, build-windows, build-linux-x64, build-linux-arm64, build-macos-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: find artifacts -type f
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            🤖 **Automated build & release by GitHub Actions** | **此版本由 GitHub Actions 自动化构建并发布**

            > All native binaries (dufs) are compiled from source — F-Droid compatible.

            | Platform | Files | Status |
            |----------|-------|--------|
            | Android | `.apk` | ✅ |
            | Windows x64 | `.zip` (portable) + `.exe` (installer) | ✅ |
            | macOS ARM64 | `.zip` (app bundle) | ⚠️ 未签名，未实机测试 |
            | Linux x64 | `.AppImage` + `.deb` + `.tar.gz` | ✅ |
            | Linux ARM64 | `.AppImage` + `.deb` + `.tar.gz` | ✅ |

            > 🍎 macOS 未签名：`xattr -cr inout.app`
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.tar.gz
            artifacts/**/*.apk
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.dmg
          generate_release_notes: true
