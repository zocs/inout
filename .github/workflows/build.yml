name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - name: Compile dufs from source
        run: |
          NDK=$(find "$ANDROID_HOME/ndk" -maxdepth 1 -type d | sort -V | tail -1)
          echo "NDK found at: $NDK"
          export ANDROID_NDK_HOME="$NDK"
          bash scripts/build_dufs.sh android-arm64
      - name: Build APK
        run: flutter build apk --release
      - name: Build AAB
        run: flutter build appbundle --release
      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk inout-${{ github.ref_name }}-android-arm64.apk
      - name: Rename AAB
        run: cp build/app/outputs/bundle/release/app-release.aab inout-${{ github.ref_name }}-android-arm64.aab
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            inout-${{ github.ref_name }}-android-arm64.apk
            inout-${{ github.ref_name }}-android-arm64.aab

  build-windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Compile dufs from source
        run: bash scripts/build_dufs.sh windows-x86_64
        shell: bash
      - run: flutter build windows --release
      - name: Copy dufs DLL to build output
        shell: bash
        run: cp "${{ github.workspace }}/assets/dufs/dufs-windows-x86_64.dll" build/windows/x64/runner/Release/dufs.dll
      - name: Create zip
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath inout-${{ github.ref_name }}-windows-x64.zip
      - name: Install NSIS
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Build NSIS installer
        run: makensis installer\inout.nsi
      - name: Rename installer
        shell: bash
        run: |
          EXE=$(ls inout-*-windows-x64-setup.exe | head -1)
          mv "$EXE" inout-${{ github.ref_name }}-windows-x64-setup.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            inout-${{ github.ref_name }}-windows-x64.zip
            inout-${{ github.ref_name }}-windows-x64-setup.exe

  build-linux-x64:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev dpkg-dev libfuse2 cmake ninja-build clang lld llvm libayatana-appindicator3-dev
      - name: Build and package
        run: bash scripts/build_linux.sh x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: build/linux/output/*

  build-linux-arm64:
    name: Linux ARM64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install Flutter manually
        run: |
          git clone --depth 1 --branch stable https://github.com/flutter/flutter.git "$HOME/flutter"
          export PATH="$HOME/flutter/bin:$HOME/flutter/bin/cache/dart-sdk/bin:$PATH"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
          echo "$HOME/flutter/bin/cache/dart-sdk/bin" >> "$GITHUB_PATH"
          flutter precache --linux
          flutter config --no-analytics
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev dpkg-dev libfuse2 cmake ninja-build clang lld llvm libayatana-appindicator3-dev
      - name: Build and package
        run: |
          export PATH="$HOME/flutter/bin:$HOME/flutter/bin/cache/dart-sdk/bin:$PATH"
          bash scripts/build_linux.sh aarch64
      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: build/linux/output/*

  build-macos-arm64:
    name: macOS ARM64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Build and package
        run: bash scripts/build_macos.sh aarch64
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: build/macos/output/*

  build-ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios
      - name: Compile dufs from source
        run: bash scripts/build_dufs.sh ios-arm64
      - name: Build iOS (no codesign)
        run: |
          flutter build ios --release --no-codesign
          mkdir -p build/ios/output
          APP_NAME="inout"
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | tr -d '+')
          cp -r build/ios/iphoneos/Runner.app "build/ios/output/${APP_NAME}-${VERSION}-ios-arm64.app"
          cd build/ios/output && zip -r -y "${APP_NAME}-${VERSION}-ios-arm64.zip" "${APP_NAME}-${VERSION}-ios-arm64.app"
      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: build/ios/output/*

  release:
    name: Release
    needs: [build-android, build-windows, build-linux-x64, build-linux-arm64, build-macos-arm64, build-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: find artifacts -type f
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            🤖 **Automated build & release by GitHub Actions** | **此版本由 GitHub Actions 自动化构建并发布**

            > All native binaries (dufs) are compiled from source — F-Droid compatible.

            | Platform | Files | Status |
            |----------|-------|--------|
            | Android | `.apk` + `.aab` (Play Store) | ✅ |
            | iOS | `.zip` (app bundle) | ⚠️ 未签名，未实机测试 |
            | Windows x64 | `.zip` (portable) | ✅ |
            | macOS ARM64 | `.zip` (app bundle) | ⚠️ 未签名，未实机测试 |
            | Linux x64 | `.AppImage` + `.deb` + `.tar.gz` | ✅ |
            | Linux ARM64 | `.AppImage` + `.deb` + `.tar.gz` | ✅ |

            > 🍎 iOS/macOS 未签名：`xattr -cr inout.app`
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.tar.gz
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.dmg
          generate_release_notes: true
