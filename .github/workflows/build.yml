name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
      - run: flutter build apk --release
      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk inout-${{ github.ref_name }}-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: inout-${{ github.ref_name }}-android.apk

  build-windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
      - run: flutter build windows --release
      - name: Create zip
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath inout-${{ github.ref_name }}-windows-x64.zip
      - name: Install NSIS
        run: choco install nsis -y
      - name: Build NSIS installer
        run: makensis installer\inout.nsi
      - name: Rename installer
        run: mv inout-0.1.0-windows-x64-setup.exe inout-${{ github.ref_name }}-windows-x64-setup.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            inout-${{ github.ref_name }}-windows-x64.zip
            inout-${{ github.ref_name }}-windows-x64-setup.exe

  build-linux-x64:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev dpkg-dev rpm liblzma-dev
      - name: Build and package
        run: bash scripts/build_linux.sh x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: build/linux/output/*.{AppImage,deb,rpm,tar.gz}

  build-linux-arm64:
    name: Linux ARM64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev dpkg-dev rpm liblzma-dev
      - name: Build and package
        run: bash scripts/build_linux.sh aarch64
      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: build/linux/output/*.{AppImage,deb,rpm,tar.gz}

  release:
    name: Release
    needs: [build-android, build-windows, build-linux-x64, build-linux-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: find artifacts -type f
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/android/*
            artifacts/windows/*
            artifacts/linux-x64/*
            artifacts/linux-arm64/*
          generate_release_notes: true
