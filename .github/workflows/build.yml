  #     - uses: actions/upload-artifact@v4
  #       with:
  #         name: macos-x64
  #         path: build/macos/output/*

  release:
    name: Release
    needs: [build-macos-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: find artifacts -type f
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            🤖 **Automated build & release by GitHub Actions** | **此版本由 GitHub Actions 自动化构建并发布**

            | Platform | Files |
            |----------|-------|
            | Android | `.apk` |
            | Windows x64 | `.exe` (installer) + `.zip` (portable) |
            | macOS ARM64 | `.zip` (app bundle) |
            | Linux x64 | `.AppImage` + `.deb` + `.tar.gz` |
            | Linux ARM64 | `.AppImage` + `.deb` + `.tar.gz` |

            > 💡 AppImage requires no dependencies, works on any Linux distro. For Chinese domestic distros (Kylin, UOS), use `.AppImage` or `.deb`.
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.tar.gz
            artifacts/**/*.apk
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.dmg
          generate_release_notes: true
