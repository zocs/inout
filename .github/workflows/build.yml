  build-linux-arm64:
    name: Linux ARM64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install Flutter manually
        run: |
          git clone --depth 1 --branch stable https://github.com/flutter/flutter.git "$HOME/flutter"
          export PATH="$HOME/flutter/bin:$HOME/flutter/bin/cache/dart-sdk/bin:$PATH"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
          echo "$HOME/flutter/bin/cache/dart-sdk/bin" >> "$GITHUB_PATH"
          flutter precache --linux
          flutter config --no-analytics
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev dpkg-dev libfuse2 cmake ninja-build clang lld llvm
      - name: Build and package
        run: |
          export PATH="$HOME/flutter/bin:$HOME/flutter/bin/cache/dart-sdk/bin:$PATH"
          bash scripts/build_linux.sh aarch64
      - name: Debug - check AppDir contents
        if: always()
        run: |
          echo "=== AppDir files ==="
          find build/linux/output/inout.AppDir -type f 2>/dev/null | head -30
          echo "=== File architectures ==="
          find build/linux/output/inout.AppDir -type f -exec file {} \; 2>/dev/null | head -20
          echo "=== Output files ==="
          ls -la build/linux/output/ 2>/dev/null
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-arm64
          path: build/linux/output/*

  release:
    name: Release
    needs: [build-linux-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: find artifacts -type f
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
