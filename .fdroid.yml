AutoName: inout
Summary: One-tap file sharing via browser - one install, everyone uploads & downloads
Description: |-
  inout is a graphical file sharing application that lets you share files
  from your device to any browser on your local network.

  Features:

  * One-tap file sharing via HTTP
  * Upload files from any browser
  * QR code for easy access
  * File transfer log
  * Customizable permissions
  * Multi-language support
  * Material 3 design

RepoType: git
Repo: https://github.com/zocs/inout

Builds:
  - versionName: 0.3.2
    versionCode: 32
    commit: 3be86d42f5056e87b04b218ab768b7a3c4767619
    sudo:
      - apt-get update
      - apt-get install -y protobuf-compiler build-essential
    output: build/app/outputs/flutter-apk/app-release.apk
    srclibs:
      - flutter@3.41.5
    prebuild:
      - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain
        1.86.0 --no-modify-path
      - source "$HOME/.cargo/env"
      - rustup target add aarch64-linux-android
      - export ANDROID_NDK_HOME="$$NDK$$"
      - export PUB_CACHE="$(pwd)/.pub-cache"
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
      - bash scripts/build_dufs.sh android-arm64
    scanignore:
      - android/app/src/main/jniLibs
      - .pub-cache
    build:
      - export PUB_CACHE="$(pwd)/.pub-cache"
      - $$flutter$$/bin/flutter build apk --release --build-name=0.3.2 --build-number=32
    ndk: r27

